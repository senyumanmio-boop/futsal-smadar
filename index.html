<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SimCity Sederhana + Fitur Lengkap</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #e0f7fa;
    margin: 0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    margin-bottom: 10px;
  }
  #stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
  }
  #stats div {
    background: #ffffff;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
    min-width: 150px;
    text-align: center;
  }
  #game-container {
    max-width: 1024px;
    margin: 0 auto;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(12, 40px);
    gap: 4px;
    margin: 0 auto;
    background: #b2ebf2;
    padding: 10px;
    border-radius: 10px;
  }
  .cell {
    width: 40px;
    height: 40px;
    border: 2px solid #0097a7;
    background-color: #fff;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
    font-weight: bold;
    user-select: none;
    transition: background-color 0.2s, transform 0.1s;
  }
  .cell:hover {
    background-color: #80deea;
    transform: scale(1.05);
  }
  #controls {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
  }
  .build-btn {
    padding: 10px 15px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background-color: #00796b;
    color: white;
    transition: background 0.2s;
  }
  .build-btn:hover {
    background-color: #004d40;
  }
  #message {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
    color: #d32f2f;
  }
  #upgrade-panel {
    margin-top: 20px;
    background: #ffffff;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
  }
  #upgrade-panel h2 {
    margin-top: 0;
    text-align: center;
  }
  #upgrade-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .upgrade-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f1f8e9;
    padding: 8px;
    border-radius: 5px;
  }
  .upgrade-item button {
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    background-color: #558b2f;
    color: white;
    cursor: pointer;
    font-size: 13px;
  }
  .upgrade-item button:hover {
    background-color: #33691e;
  }
  /* Responsive for small screens */
  @media(max-width: 768px) {
    #grid {
      grid-template-columns: repeat(8, 40px);
    }
  }
</style>
</head>
<body>
<h1>SimCity Sederhana + Fitur Lengkap</h1>
<div id="stats">
  <div>Uang: $<span id="money">1500</span></div>
  <div>Bahan: <span id="materials">50</span></div>
  <div>Populasi: <span id="population">0</span></div>
</div>
<div id="game-container">
  <div id="grid"></div>
  <div id="message"></div>
  <div id="controls">
    <button class="build-btn" onclick="selectBuilding('house')">Rumah ($100)</button>
    <button class="build-btn" onclick="selectBuilding('factory')">Pabrik ($300)</button>
    <button class="build-btn" onclick="selectBuilding('park')">Taman ($50)</button>
    <button class="build-btn" onclick="deselectBuilding()">Batal Pilih</button>
    <button class="build-btn" onclick="showUpgradePanel()">Upgrade Bangunan</button>
    <button class="build-btn" onclick="resetGame()">Reset Game</button>
  </div>
  <div id="upgrade-panel" style="display:none;">
    <h2>Upgrade Bangunan</h2>
    <div id="upgrade-list"></div>
    <button class="build-btn" onclick="closeUpgradePanel()">Tutup</button>
  </div>
</div>

<script>
const gridSize = 12; // 12x12 grid
const maxPopulation = 1000;

// Data game
let money = 1500;
let materials = 50;
let population = 0;
let selectedBuilding = null;
const gridData = new Array(gridSize * gridSize).fill(null);
const buildings = {
  'house': { name: 'Rumah', cost: 100, color: '#8ED6FF', symbol: 'H', income: 2, pop: 1, level: 1 },
  'factory': { name: 'Pabrik', cost: 300, color: '#FF8C00', symbol: 'F', income: 5, pop: 5, level: 1 },
  'park': { name: 'Taman', cost: 50, color: '#7CFC00', symbol: 'P', income: 0, pop: 0, level: 1 }
};
const upgradeOptions = {
  'house': { upgradeCost: 150, income: 1, pop: 1 },
  'factory': { upgradeCost: 300, income: 2, pop: 2 },
  'park': { upgradeCost: 50, income: 0, pop: 0 }
};

// Load game dari localStorage
loadGame();

const gridContainer = document.getElementById('grid');
const messageDiv = document.getElementById('message');
const moneySpan = document.getElementById('money');
const materialsSpan = document.getElementById('materials');
const populationSpan = document.getElementById('population');

const upgradePanel = document.getElementById('upgrade-panel');
const upgradeList = document.getElementById('upgrade-list');

// Buat grid
for(let i=0; i<gridSize*gridSize; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.dataset.index = i;
  cell.onclick = () => {
    if (gridData[i]) {
      showBuildingInfo(i);
    } else if (selectedBuilding) {
      buildBuilding(i);
    } else {
      showMessage('Pilih bangunan terlebih dahulu!');
    }
  };
  gridContainer.appendChild(cell);
}

// Fungsi tampilkan info bangunan
function showBuildingInfo(index) {
  const bType = gridData[index];
  if (bType) {
    const b = buildings[bType];
    showMessage(`Bangunan: ${b.name} (Level ${b.level}) - Income: $${b.income} / tick, Pop: ${b.pop}`);
  }
}

// Fungsi bangun bangunan
function buildBuilding(index) {
  const bType = selectedBuilding;
  const b = buildings[bType];
  if (money >= b.cost) {
    if (!gridData[index]) {
      gridData[index] = bType;
      updateCell(index);
      money -= b.cost;
      updateStats();
      saveGame();
    } else {
      showMessage('Sudah ada bangunan di sini!');
    }
  } else {
    showMessage('Uang tidak cukup!');
  }
}

// Update tampilan cell
function updateCell(index) {
  const cell = gridContainer.children[index];
  const bType = gridData[index];
  if (bType) {
    const b = buildings[bType];
    cell.style.backgroundColor = b.color;
    cell.innerText = b.symbol + (b.level > 1 ? 'L' + b.level : '');
  } else {
    cell.style.backgroundColor = '#fff';
    cell.innerText = '';
  }
}

// Update semua sel
function refreshGrid() {
  for(let i=0; i<gridData.length; i++) {
    updateCell(i);
  }
}

// Pilih bangunan
function selectBuilding(type) {
  selectedBuilding = type;
  showMessage(`Memilih: ${buildings[type].name}`);
}

// Batalkan pilihan
function deselectBuilding() {
  selectedBuilding = null;
  showMessage('Pilih bangunan dulu!');
}

// Update statistik
function updateStats() {
  moneySpan.innerText = money;
  materialsSpan.innerText = materials;
  populationSpan.innerText = population;
}

// Tampilkan pesan
function showMessage(msg) {
  messageDiv.innerText = msg;
}

// Simpan game
function saveGame() {
  localStorage.setItem('simcity', JSON.stringify({
    money, materials, population, gridData
  }));
}

// Muat game
function loadGame() {
  const data = localStorage.getItem('simcity');
  if (data) {
    const parsed = JSON.parse(data);
    money = parsed.money;
    materials = parsed.materials;
    population = parsed.population;
    for(let i=0; i<parsed.gridData.length; i++) {
      gridData[i] = parsed.gridData[i];
    }
  }
  updateStats();
  refreshGrid();
}

// Fungsi upgrade bangunan
function showUpgradePanel() {
  upgradePanel.style.display = 'block';
  upgradeList.innerHTML = '';
  // List semua bangunan yang ada
  for (let i=0; i<gridData.length; i++) {
    const bType = gridData[i];
    if (bType) {
      const b = buildings[bType];
      const item = document.createElement('div');
      item.className = 'upgrade-item';
      item.innerHTML = `
        ${b.name} (Level ${b.level}) - Income: ${b.income} / tick, Pop: ${b.pop}
        <button onclick="upgradeBuilding(${i})">Upgrade ($${upgradeOptions[bType].upgradeCost})</button>
      `;
      upgradeList.appendChild(item);
    }
  }
}

// Tutup panel upgrade
function closeUpgradePanel() {
  upgradePanel.style.display = 'none';
}

// Upgrade bangunan
function upgradeBuilding(index) {
  const bType = gridData[index];
  if (!bType) return;
  const b = buildings[bType];
  const upgrade = upgradeOptions[bType];
  if (money >= upgrade.upgradeCost) {
    money -= upgrade.upgradeCost;
    b.income += upgrade.income;
    b.pop += upgrade.pop;
    b.level += 1;
    updateCell(index);
    updateStats();
    showMessage(`${b.name} di posisi ${index} telah diupgrade!`);
    saveGame();
    showUpgradePanel();
  } else {
    showMessage('Uang tidak cukup untuk upgrade!');
  }
}

// Reset game
function resetGame() {
  if (confirm('Yakin ingin reset game? Data akan hilang!')) {
    localStorage.removeItem('simcity');
    location.reload();
  }
}

// Simulasi otomatis pendapatan setiap detik
setInterval(() => {
  let totalIncome = 0;
  for (let i=0; i<gridData.length; i++) {
    const bType = gridData[i];
    if (bType) {
      totalIncome += buildings[bType].income;
    }
  }
  money += totalIncome;
  // Tambahkan populasi secara otomatis
  for (let i=0; i<gridData.length; i++) {
    const bType = gridData[i];
    if (bType) {
      population += buildings[bType].pop;
      if (population > maxPopulation) population = maxPopulation;
    }
  }
  updateStats();
  saveGame();
}, 3000); // tiap 3 detik

// Inisialisasi
updateStats();

</script>
</body>
</html>
