<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manajemen Klub Futsal</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 0;
  }
  header {
    background-color: #2c3e50;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
  h1 {
    margin: 0;
  }
  .container {
    display: flex;
    flex-wrap: wrap;
    padding: 20px;
    gap: 20px;
  }
  .card {
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 20px;
    flex: 1 1 300px;
  }
  h2 {
    margin-top: 0;
    color: #34495e;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  table, th, td {
    border: 1px solid #ddd;
  }
  th, td {
    padding: 8px;
    text-align: left;
  }
  input[type="number"], input[type="text"], select, input[type="date"] {
    width: calc(100% - 16px);
    padding: 8px;
    margin-top: 8px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  button {
    background-color: #27ae60;
    color: #fff;
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background-color: #2ecc71;
  }
  .form-group {
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>Manajemen Klub Futsal</h1>
</header>

<div class="container">
  <!-- Kas -->
  <div class="card" id="kas">
    <h2>Kas</h2>
    <p>Total Pemasukan: <span id="total_pemasukan">0</span></p>
    <p>Total Pengeluaran: <span id="total_pengeluaran">0</span></p>
    <p>Saldo: <span id="saldo">0</span></p>
    <div>
      <h3>Tambah Pemasukan</h3>
      <input type="number" id="pemasukan_amount" placeholder="Jumlah pemasukan" />
      <button onclick="tambahPemasukan()">Tambah</button>
    </div>
    <div>
      <h3>Tambah Pengeluaran</h3>
      <input type="number" id="pengeluaran_amount" placeholder="Jumlah pengeluaran" />
      <button onclick="tambahPengeluaran()">Tambah</button>
    </div>
  </div>

  <!-- Formasi Tim -->
  <div class="card" id="formasi">
    <h2>Formasi Tim</h2>
    <form id="formasiForm" onsubmit="return tambahFormasi()">
      <div class="form-group">
        <label>Nama Pemain:</label>
        <input type="text" id="nama_pemain" required />
      </div>
      <div class="form-group">
        <label>Posisi:</label>
        <select id="posisi" required>
          <option value="Penjaga Gawang">Penjaga Gawang</option>
          <option value="Belakang">Belakang</option>
          <option value="Tengah">Tengah</option>
          <option value="Penyerang">Penyerang</option>
        </select>
      </div>
      <button type="submit">Tambah Pemain</button>
    </form>
    <table id="tabelFormasi">
      <thead>
        <tr>
          <th>Nama Pemain</th>
          <th>Posisi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Jadwal Tanding -->
  <div class="card" id="jadwal">
    <h2>Jadwal Tanding</h2>
    <form id="jadwalForm" onsubmit="return tambahJadwal()">
      <div class="form-group">
        <label>Tanggal:</label>
        <input type="date" id="tanggal" required />
      </div>
      <div class="form-group">
        <label>Waktu:</label>
        <input type="text" id="waktu" placeholder="Contoh: 15:00" required />
      </div>
      <div class="form-group">
        <label>Tempat:</label>
        <input type="text" id="tempat" placeholder="Lokasi pertandingan" required />
      </div>
      <button type="submit">Tambah Jadwal</button>
    </form>
    <table id="tabelJadwal">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Waktu</th>
          <th>Tempat</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  // Data kas
  let pemasukan = 0;
  let pengeluaran = 0;

  // Data formasi
  const formasiList = [];

  // Data jadwal
  const jadwalList = [];

  // Update saldo
  function updateKas() {
    document.getElementById('total_pemasukan').innerText = pemasukan;
    document.getElementById('total_pengeluaran').innerText = pengeluaran;
    document.getElementById('saldo').innerText = pemasukan - pengeluaran;
  }

  function tambahPemasukan() {
    const amount = parseFloat(document.getElementById('pemasukan_amount').value);
    if (!isNaN(amount) && amount > 0) {
      pemasukan += amount;
      document.getElementById('pemasukan_amount').value = '';
      updateKas();
    } else {
      alert('Masukkan jumlah pemasukan yang valid.');
    }
  }

  function tambahPengeluaran() {
    const amount = parseFloat(document.getElementById('pengeluaran_amount').value);
    if (!isNaN(amount) && amount > 0) {
      pengeluaran += amount;
      document.getElementById('pengeluaran_amount').value = '';
      updateKas();
    } else {
      alert('Masukkan jumlah pengeluaran yang valid.');
    }
  }

  // Tambah formasi
  function tambahFormasi() {
    const nama = document.getElementById('nama_pemain').value;
    const posisi = document.getElementById('posisi').value;
    if (nama && posisi) {
      formasiList.push({nama, posisi});
      tampilkanFormasi();
      document.getElementById('formasiForm').reset();
    }
    return false; // agar form tidak reload
  }

  function tampilkanFormasi() {
    const tbody = document.querySelector('#tabelFormasi tbody');
    tbody.innerHTML = '';
    for (const pemain of formasiList) {
      const row = document.createElement('tr');
      row.innerHTML = `<td>${pemain.nama}</td><td>${pemain.posisi}</td>`;
      tbody.appendChild(row);
    }
  }

  // Tambah jadwal
  function tambahJadwal() {
    const tanggal = document.getElementById('tanggal').value;
    const waktu = document.getElementById('waktu').value;
    const tempat = document.getElementById('tempat').value;
    if (tanggal && waktu && tempat) {
      jadwalList.push({tanggal, waktu, tempat});
      tampilkanJadwal();
      document.getElementById('jadwalForm').reset();
    }
    return false; // agar form tidak reload
  }

  function tampilkanJadwal() {
    const tbody = document.querySelector('#tabelJadwal tbody');
    tbody.innerHTML = '';
    for (const jadwal of jadwalList) {
      const row = document.createElement('tr');
      row.innerHTML = `<td>${jadwal.tanggal}</td><td>${jadwal.waktu}</td><td>${jadwal.tempat}</td>`;
      tbody.appendChild(row);
    }
  }

  // Inisialisasi saldo awal
  updateKas();
</script>

</body>
</html>
