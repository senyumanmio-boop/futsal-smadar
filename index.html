<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futsal Club Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .nav-item.active { background-color: #3b82f6; color: white; }
        .hidden-section { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center text-xl font-bold"><i class="fa-solid fa-futbol text-blue-500 mr-3"></i> FUTSAL<span class="text-blue-500">CLUB</span></div>
            <div class="flex space-x-2">
                <button onclick="showSection('dashboard')" class="nav-item active px-3 py-2 rounded-md text-sm" id="btn-dashboard">Dashboard</button>
                <button onclick="showSection('keuangan')" class="nav-item px-3 py-2 rounded-md text-sm" id="btn-keuangan">Keuangan</button>
                <button onclick="showSection('jadwal')" class="nav-item px-3 py-2 rounded-md text-sm" id="btn-jadwal">Jadwal</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-6 max-w-7xl mx-auto w-full">
        <section id="dashboard" class="fade-in">
            <h2 class="text-3xl font-bold mb-6">Dashboard Utama</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-800 p-6 rounded-xl border-l-4 border-green-500">
                    <p class="text-slate-400">Saldo Kas</p>
                    <h3 class="text-3xl font-bold" id="dash-balance">Rp 0</h3>
                </div>
                <div class="bg-slate-800 p-6 rounded-xl border-l-4 border-blue-500">
                    <p class="text-slate-400">Jadwal Terdekat</p>
                    <h3 class="text-xl font-bold" id="dash-next-match">Belum ada jadwal</h3>
                </div>
            </div>
        </section>

        <section id="keuangan" class="hidden-section fade-in">
            <h2 class="text-3xl font-bold mb-6">Manajemen Keuangan</h2>
            <form id="financeForm" onsubmit="addTransaction(event)" class="bg-slate-800 p-6 rounded-xl mb-6 flex gap-2">
                <select id="f-type" class="bg-slate-700 p-2 rounded text-white"><option value="masuk">Pemasukan</option><option value="keluar">Pengeluaran</option></select>
                <input type="number" id="f-amount" placeholder="Nominal" class="bg-slate-700 p-2 rounded text-white w-full" required>
                <input type="text" id="f-desc" placeholder="Keterangan" class="bg-slate-700 p-2 rounded text-white w-full" required>
                <button type="submit" class="bg-blue-600 px-6 py-2 rounded text-white font-bold">Simpan</button>
            </form>
            <div class="bg-slate-800 rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-700 text-sm uppercase"><tr><th class="p-4">Keterangan</th><th class="p-4">Jenis</th><th class="p-4 text-right">Nominal</th></tr></thead>
                    <tbody id="financeTableBody"></tbody>
                </table>
            </div>
        </section>

        <section id="jadwal" class="hidden-section fade-in">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold">Jadwal Pertandingan</h2>
                <button onclick="toggleMatchForm()" class="bg-green-600 px-4 py-2 rounded-lg"><i class="fa-solid fa-plus mr-2"></i>Tambah</button>
            </div>
            <div id="addMatchForm" class="hidden bg-slate-800 p-6 rounded-xl mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="m-opp" placeholder="Lawan" class="bg-slate-700 p-2 rounded text-white">
                <input type="date" id="m-date" class="bg-slate-700 p-2 rounded text-white">
                <input type="time" id="m-time" class="bg-slate-700 p-2 rounded text-white">
                <button onclick="addMatch()" class="bg-blue-600 rounded text-white">Simpan</button>
            </div>
            <div id="matchList" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <script>
        let trans = JSON.parse(localStorage.getItem('trans')) || [];
        let matches = JSON.parse(localStorage.getItem('matches')) || [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
        }

        function addTransaction(e) {
            e.preventDefault();
            trans.push({ type: document.getElementById('f-type').value, amount: parseInt(document.getElementById('f-amount').value), desc: document.getElementById('f-desc').value });
            localStorage.setItem('trans', JSON.stringify(trans));
            document.getElementById('financeForm').reset();
            render();
        }

        function addMatch() {
            matches.push({ opp: document.getElementById('m-opp').value, date: document.getElementById('m-date').value });
            localStorage.setItem('matches', JSON.stringify(matches));
            render();
        }

        function toggleMatchForm() { document.getElementById('addMatchForm').classList.toggle('hidden'); }

        function render() {
            document.getElementById('financeTableBody').innerHTML = trans.map(t => `<tr class="border-b border-slate-700"><td class="p-4">${t.desc}</td><td class="p-4">${t.type}</td><td class="p-4 text-right">Rp ${t.amount.toLocaleString()}</td></tr>`).join('');
            document.getElementById('matchList').innerHTML = matches.map(m => `<div class="bg-slate-800 p-6 rounded-xl"><h4>Vs ${m.opp}</h4><p class="text-slate-400 text-sm">${m.date}</p></div>`).join('');
            let bal = trans.reduce((s, t) => t.type === 'masuk' ? s + t.amount : s - t.amount, 0);
            document.getElementById('dash-balance').innerText = `Rp ${bal.toLocaleString()}`;
            if(matches.length > 0) document.getElementById('dash-next-match').innerText = `vs ${matches[matches.length-1].opp}`;
        }

        render();
    </script>
</body>
</html>
