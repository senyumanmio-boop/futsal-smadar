<!DOCTYPE html>
<html lang="id" class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manajemen Klub Futsal</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="flex flex-col min-h-screen">

<!-- Navbar -->
<nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
    <div class="flex items-center space-x-3 font-bold text-xl text-blue-400">
      <i class="fas fa-futbol"></i>
      <span>FUTSAL CLUB</span>
    </div>
    <div class="flex space-x-4">
      <button id="btn-dashboard" class="px-3 py-2 rounded-md bg-blue-600 font-semibold" onclick="showSection('dashboard')">Dashboard</button>
      <button id="btn-keuangan" class="px-3 py-2 rounded-md hover:bg-gray-700" onclick="showSection('keuangan')">Keuangan</button>
      <button id="btn-formasi" class="px-3 py-2 rounded-md hover:bg-gray-700" onclick="showSection('formasi')">Formasi</button>
      <button id="btn-histori" class="px-3 py-2 rounded-md hover:bg-gray-700" onclick="showSection('histori')">Histori</button>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="flex-1 p-6 max-w-7xl mx-auto w-full space-y-8">

  <!-- Dashboard -->
  <section id="dashboard" class="transition-all duration-300">
    <div class="grid md:grid-cols-2 gap-6">
      <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-green-500 shadow-lg">
        <div class="flex items-center justify-between mb-2">
          <p class="text-gray-400">Saldo Kas</p>
          <i class="fas fa-wallet text-green-400"></i>
        </div>
        <h3 class="text-3xl font-bold" id="dash-balance">Rp 0</h3>
      </div>
      <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-blue-500 shadow-lg">
        <div class="flex items-center justify-between mb-2">
          <p class="text-gray-400">Histori Terbaru</p>
          <i class="fas fa-history text-blue-400"></i>
        </div>
        <h3 class="text-xl font-semibold" id="dash-histori">Belum ada data</h3>
      </div>
    </div>
  </section>

  <!-- Keuangan -->
  <section id="keuangan" class="hidden transition-all duration-300">
    <h2 class="text-3xl font-bold mb-4 flex items-center space-x-2">
      <i class="fas fa-money-bill-wave"></i>
      <span>Manajemen Keuangan</span>
    </h2>
    <form id="financeForm" onsubmit="addTransaction(event)" class="bg-gray-800 p-6 rounded-xl mb-6 flex flex-col md:flex-row gap-4 shadow-lg">
      <select id="f-type" class="bg-gray-700 p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-white" required>
        <option value="masuk">Pemasukan</option>
        <option value="keluar">Pengeluaran</option>
      </select>
      <input type="number" id="f-amount" placeholder="Nominal" class="bg-gray-700 p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-white" required>
      <input type="text" id="f-desc" placeholder="Keterangan" class="bg-gray-700 p-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-white" required>
      <button type="submit" class="bg-blue-600 px-6 py-3 rounded font-semibold hover:bg-blue-500 transition">Simpan</button>
    </form>
    <div class="overflow-x-auto">
      <table class="w-full text-left table-auto border-collapse border border-gray-700 rounded-lg overflow-hidden shadow-lg">
        <thead class="bg-gray-700 text-sm uppercase">
          <tr>
            <th class="p-4 border border-gray-600">Keterangan</th>
            <th class="p-4 border border-gray-600">Jenis</th>
            <th class="p-4 border border-gray-600 text-right">Nominal</th>
          </tr>
        </thead>
        <tbody id="financeTableBody"></tbody>
      </table>
    </div>
  </section>

  <!-- Formasi & Histori -->
  <section id="formasi" class="hidden transition-all duration-300 space-y-8">

    <!-- Formasi Pemain lengkap -->
    <div>
      <h2 class="text-3xl font-bold mb-4 flex items-center space-x-2">
        <i class="fas fa-users"></i>
        <span>Formasi Pemain & Lapangan</span>
      </h2>
      <form id="formasiForm" onsubmit="return tambahFormasi()" class="bg-gray-800 p-6 rounded-xl mb-6 flex flex-col md:flex-row gap-4 shadow-lg">
        <input type="text" id="nama_pemain" placeholder="Nama Pemain" class="bg-gray-700 p-3 rounded focus:outline-none focus:ring-2 focus:ring-green-500 text-white" required>
        <select id="posisi" class="bg-gray-700 p-3 rounded focus:outline-none focus:ring-2 focus:ring-green-500 text-white" required>
          <option value="">Pilih Posisi</option>
          <option value="Penjaga Gawang">Penjaga Gawang</option>
          <option value="Belakang">Belakang</option>
          <option value="Tengah">Tengah</option>
          <option value="Penyerang">Penyerang</option>
          <option value="Anchor">Anchor</option>
          <option value="Pivot">Pivot</option>
          <option value="Plank">Plank</option>
        </select>
        <!-- Upload Foto -->
        <input type="file" id="foto_pemain" accept="image/*" class="bg-gray-700 p-3 rounded focus:outline-none focus:ring-2 focus:ring-green-500 text-white" />
        <button type="submit" class="bg-green-600 px-4 py-3 rounded font-semibold hover:bg-green-500 transition">Tambah Pemain</button>
      </form>
      <!-- Tabel Formasi -->
      <div class="overflow-x-auto mb-8">
        <table class="w-full border border-gray-700 rounded-lg shadow-lg">
          <thead class="bg-gray-700 text-sm uppercase">
            <tr>
              <th class="p-4 border border-gray-600">Foto</th>
              <th class="p-4 border border-gray-600">Nama</th>
              <th class="p-4 border border-gray-600">Posisi</th>
            </tr>
          </thead>
          <tbody id="formasiTableBody" class="bg-gray-800"></tbody>
        </table>
      </div>
    </div>

    <!-- Histori pertandingan -->
    <div>
      <h2 class="text-3xl font-bold mb-4 flex items-center space-x-2">
        <i class="fas fa-history"></i>
        <span>Histori Pertandingan</span>
      </h2>
      <div id="historiList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

  </section>

</main>

<!-- Scripts -->
<script>
  let trans = JSON.parse(localStorage.getItem('trans')) || [];
  let matches = JSON.parse(localStorage.getItem('matches')) || [];
  let formasi = [];

  function showSection(id) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('button').forEach(b => b.classList.remove('bg-blue-600'));
    document.getElementById('btn-' + id).classList.add('bg-blue-600');
  }

  // Tambah transaksi keuangan
  function addTransaction(e) {
    e.preventDefault();
    const type = document.getElementById('f-type').value;
    const amount = parseInt(document.getElementById('f-amount').value);
    const desc = document.getElementById('f-desc').value;
    trans.push({ type, amount, desc });
    localStorage.setItem('trans', JSON.stringify(trans));
    document.getElementById('financeForm').reset();
    render();
  }

  // Tambah pemain formasi
  function tambahFormasi() {
    const nama = document.getElementById('nama_pemain').value;
    const posisi = document.getElementById('posisi').value;
    const fotoInput = document.getElementById('foto_pemain');
    const fotoFile = fotoInput.files[0];

    if(nama && posisi) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const fotoUrl = e.target.result;
        formasi.push({ nama, posisi, foto: fotoUrl });
        renderFormasi();
      }
      if(fotoFile) {
        reader.readAsDataURL(fotoFile);
      } else {
        formasi.push({ nama, posisi, foto: '' });
        renderFormasi();
      }
    }
    document.getElementById('formasiForm').reset();
    return false;
  }

  // Render ke tabel formasi
  function renderFormasi() {
    document.getElementById('formasiTableBody').innerHTML = formasi.map(p => `
      <tr>
        <td class="p-2 border border-gray-600 text-center">
          ${p.foto ? `<img src="${p.foto}" class="w-16 h-16 object-cover rounded" />` : 'No Photo'}
        </td>
        <td class="p-4 border border-gray-600">${p.nama}</td>
        <td class="p-4 border border-gray-600">${p.posisi}</td>
      </tr>
    `).join('');
  }

  // Tambah histori pertandingan
  function addMatch() {
    const opp = document.getElementById('m-opp').value;
    const date = document.getElementById('m-date').value;
    const time = document.getElementById('m-time').value;
    matches.push({ opp, date, time });
    localStorage.setItem('matches', JSON.stringify(matches));
    document.getElementById('m-opp').value = '';
    document.getElementById('m-date').value = '';
    document.getElementById('m-time').value = '';
    toggleMatchForm();
    renderHistori();
  }

  function toggleMatchForm() {
    document.getElementById('addMatchForm').classList.toggle('hidden');
  }

  // Render semua data
  function render() {
    // Keuangan
    document.getElementById('financeTableBody').innerHTML = trans.map(t => `
      <tr class="border-b border-gray-700">
        <td class="p-4 border border-gray-600">${t.desc}</td>
        <td class="p-4 border border-gray-600">${t.type}</td>
        <td class="p-4 border border-gray-600 text-right">Rp ${t.amount.toLocaleString()}</td>
      </tr>
    `).join('');
    const saldo = trans.reduce((a, t) => t.type==='masuk'?a+t.amount:a-t.amount, 0);
    document.getElementById('dash-balance').innerText = `Rp ${saldo.toLocaleString()}`;

    // Histori pertandingan
    renderHistori();
  }

  function renderHistori() {
    document.getElementById('historiList').innerHTML = matches.length > 0 ? matches.map(m => `
      <div class="bg-gray-700 p-4 rounded-lg shadow-lg">
        <h4 class="font-semibold mb-2">Vs ${m.opp}</h4>
        <p class="text-gray-300">${m.date} | ${m.time}</p>
      </div>
    `).join('') : '<p class="text-gray-400">Belum ada data pertandingan</p>';

    // Update data di dashboard
    if(matches.length > 0) {
      document.getElementById('dash-histori').innerText = `Terakhir vs ${matches[matches.length-1].opp}`;
    } else {
      document.getElementById('dash-histori').innerText = 'Belum ada data';
    }
  }

  // Inisialisasi
  showSection('dashboard');
  render();
</script>

</body>
</html>
